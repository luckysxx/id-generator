name: release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REGISTRY: crpi-owej7l76wqheszs7.cn-hangzhou.personal.cr.aliyuncs.com
      IMAGE_REPO: crpi-owej7l76wqheszs7.cn-hangzhou.personal.cr.aliyuncs.com/luckys-go-project/id-generator

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Compute image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}

      - name: Checkout infra
        uses: actions/checkout@v4
        with:
          repository: luckysxx/infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update deployment image tag
        run: |
          chmod +x infra/scripts/update-k8s-image.sh
          infra/scripts/update-k8s-image.sh \
            infra/k8s/id-generator/deployment.yaml \
            "${IMAGE_REPO}" \
            "${IMAGE_TAG}"

      - name: Commit and push infra changes
        run: |
          cd infra
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No infra changes detected."
            exit 0
          fi
          git add k8s/id-generator/deployment.yaml
          git commit -m "chore(id-generator): deploy ${IMAGE_TAG}"
          git push origin main
